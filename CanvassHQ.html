body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--text)}
.hdr{background:var(--blue);color:#fff;padding:20px 16px;text-align:center}

.section{padding:16px}

.turf-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.turf-card.taken{opacity:.4}
.turf-left h3{font-size:14px;font-weight:600}.turf-left p{font-size:12px;color:var(--sub);margin-top:2px}
.turf-meta{font-size:12px;color:var(--sub)}
.btn-go{padding:10px 20px;border-radius:10px;background:var(--blue);color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;-webkit-appearance:none}
.btn-go:disabled{background:#ccc}
.btn-go:active{opacity:.8}
.taken-label{font-size:12px;color:var(--sub);font-style:italic}
.stats{display:flex;gap:16px;justify-content:center;margin:12px 0}
.stat{text-align:center}.stat-num{font-size:24px;font-weight:700;color:var(--blue)}.stat-label{font-size:11px;color:var(--sub)}
.no-name-msg{text-align:center;padding:20px;color:var(--sub);font-size:14px}
</style>
</head>

  var assigned = {};
  var currentSite = "all";

  // Add launch site filter buttons
  var sites = {};
  ALL_TURFS.forEach(function(t){ if(t.launch_site) sites[t.launch_site]=1; });
  var filterDiv = document.getElementById("siteFilters");
  Object.keys(sites).sort().forEach(function(s){
    var btn = document.createElement("button");
    btn.className = "filter-btn";
    btn.setAttribute("data-site", s);
    btn.textContent = s;
    filterDiv.appendChild(btn);
  });

  filterDiv.addEventListener("click", function(e){
    var btn = e.target.closest(".filter-btn");
    if(!btn) return;
    filterDiv.querySelectorAll(".filter-btn").forEach(function(b){ b.classList.remove("active"); });
    btn.classList.add("active");
    currentSite = btn.getAttribute("data-site");
    render();
  });

  function render(){
    var name = document.getElementById("volName").value.trim();
    var list = document.getElementById("turfList");
    if(!name){
      list.innerHTML = '<div class="no-name-msg">Enter your name above to see available turfs</div>';
      return;
    }
    var filtered = ALL_TURFS.filter(function(t){
      if(currentSite === "all") return true;
      if(currentSite === "SOLO") return t.category.indexOf("SOLO") >= 0;
      return t.launch_site === currentSite;
    });
    filtered.sort(function(a,b){ return a.priority - b.priority; });
    var html = "";
    filtered.forEach(function(t){
      var taken = assigned[t.id];
      var cls = taken ? "turf-card taken" : "turf-card";
      html += '<div class="' + cls + '">';
      html += '<div class="turf-left"><h3>' + t.name + '</h3>';
      html += '<p>' + t.doors + ' doors · ' + t.voters + ' voters · Priority #' + t.priority + '</p></div>';
      if(taken){
        html += '<span class="taken-label">Taken by ' + taken + '</span>';
      } else {
        html += '<button class="btn-go" data-id="' + t.id + '" data-name="' + t.name + '" data-file="' + t.file + '">Go</button>';
      }
      html += '</div>';
    });
    list.innerHTML = html || '<div class="no-name-msg">No turfs match this filter</div>';
  }

  document.getElementById("volName").addEventListener("input", render);

  document.getElementById("turfList").addEventListener("click", function(e){
    var btn = e.target.closest(".btn-go");
    if(!btn) return;
    var tid = btn.getAttribute("data-id");
    var tname = btn.getAttribute("data-name");
    var file = btn.getAttribute("data-file");
    var vol = document.getElementById("volName").value.trim();
    
    assigned[tid] = vol;
    render();
    
    // Register assignment on server via hidden iframe form (bypasses CORS for local files)
    if(SCRIPT_URL.indexOf("YOUR_") === -1){
      var ifr = document.createElement("iframe");
      ifr.name = "af_" + Math.random().toString(36).slice(2);
      ifr.style.display = "none";
      document.body.appendChild(ifr);
      var form = document.createElement("form");
      form.method = "GET";
      form.action = SCRIPT_URL;
      form.target = ifr.name;
      var fields = {action:"assign",turf_id:tid,volunteer:vol,turf_name:tname};
      for(var k in fields){var inp=document.createElement("input");inp.type="hidden";inp.name=k;inp.value=fields[k];form.appendChild(inp);}
      document.body.appendChild(form);
      form.submit();
      setTimeout(function(){try{ifr.remove();form.remove();}catch(e){}},15000);
    }
    
    // Open turf page
    window.open(file, "_blank");
  });

  // Load existing assignments from server via JSONP-style script tag (bypasses CORS)
  if(SCRIPT_URL.indexOf("YOUR_") === -1){
    var sc = document.createElement("script");
    sc.onload = function(){
      // Script tag can't read response from Apps Script, so we rely on local tracking
      // Assignments are recorded server-side for the Google Sheet record
    };
    // Use an iframe to load assignment data
    var ifr = document.createElement("iframe");
    ifr.style.display = "none";
    ifr.src = SCRIPT_URL + "?action=list";
    ifr.onload = function(){
      try {
        var txt = ifr.contentDocument.body.innerText;
        var d = JSON.parse(txt);
        if(d.assigned){ assigned = d.assigned; render(); }
      } catch(e){}
      ifr.remove();
    };
    document.body.appendChild(ifr);
  }

  render();
})();
</script>
