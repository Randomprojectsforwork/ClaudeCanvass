* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

/* === DASHBOARD === */
#dashboard { padding: 15px; }
#dashboard h1 { color: #1B4332; font-size: 22px; margin-bottom: 5px; }
.subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }
.total-banner { background: #1B4332; color: white; border-radius: 10px; padding: 15px;
                 margin-bottom: 15px; text-align: center; }
.total-banner .big { font-size: 28px; font-weight: bold; }
.session-card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 12px;

.session-hdr { font-size: 18px; font-weight: bold; color: #1B4332; }
.session-stats { font-size: 13px; color: #666; margin-bottom: 10px; }
.turf-link { display: block; background: #f0f7f0; border-radius: 8px; padding: 12px;

.turf-detail { display: block; font-size: 12px; color: #666; margin-top: 2px; }
.turf-assigned { display: block; font-size: 11px; font-weight: 600; margin-top: 3px; color: #0c5460; }
.no-assignment { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 15px;

.code-entry { background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px;
              border: 1px solid #e0e0e0; text-align: center; }
.code-entry label { font-weight: 600; font-size: 14px; color: #666; display: block; margin-bottom: 8px; }
.code-input { padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 18px;
              text-align: center; width: 100px; letter-spacing: 4px; }
.name-entry { background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px;
              border: 1px solid #e0e0e0; }
.name-entry label { font-weight: 600; font-size: 15px; color: #1B4332; display: block; margin-bottom: 8px; }
.name-row { display: flex; gap: 8px; }
.name-input { flex: 1; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
.btn-set-name { background: #1B4332; color: white; padding: 10px 16px; border: none; border-radius: 8px;

.name-display { display: flex; justify-content: space-between; align-items: center; }
.name-display .greeting { font-size: 15px; font-weight: 600; color: #1B4332; }
.name-display .change-link { font-size: 13px; color: #007bff; cursor: pointer; text-decoration: underline; }

/* === TURF VIEW === */
#turfview { display: none; }
.sticky-header { position: sticky; top: 0; z-index: 100; background: #f5f5f5; padding: 10px 10px 0; }
.header { background: #1B4332; color: white; padding: 12px 15px; border-radius: 10px; margin-bottom: 8px; }
.header h1 { font-size: 16px; margin-bottom: 3px; }
.header p { font-size: 12px; opacity: 0.85; }
.progress { background: #ddd; border-radius: 8px; height: 6px; margin: 6px 0 0; }
.progress-bar { background: #28a745; height: 6px; border-radius: 8px; width: 0%; transition: width 0.3s; }
.stats { display: flex; justify-content: space-around; background: white; padding: 8px;

.stats div { text-align: center; }
.stats .num { font-size: 18px; font-weight: bold; color: #1B4332; }
.action-bar { display: flex; gap: 6px; margin-bottom: 6px; }
.action-bar a, .action-bar button { flex: 1; font-size: 13px; padding: 8px 6px; border-radius: 8px;
                                      border: none; cursor: pointer; text-align: center; font-weight: 600;
                                      text-decoration: none; }
.btn-route { background: #6F42C1; color: white; }
.btn-start { background: #28a745; color: white; }
.btn-pause { background: #ffc107; color: #333; display: none; }
.btn-dash { background: #6c757d; color: white; }
.route-note { font-size: 10px; color: #666; text-align: center; margin-bottom: 4px; }
.sticky-shadow { height: 4px; background: linear-gradient(to bottom, rgba(0,0,0,0.08), transparent); }
.content { padding: 0 10px 10px; }
.resume-banner { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 10px;

.door { background: white; border-radius: 8px; padding: 12px; margin-bottom: 8px;

.door-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
.btn-nav-sm { background: #007bff; color: white; padding: 3px 8px; border-radius: 5px; font-size: 11px;

.btn-done { background: #1B4332; color: white; }
.btn-skip { background: #ffc107; color: #333; }

.door-voters { font-size: 13px; color: #1B4332; font-weight: 600; margin-left: 36px; margin-bottom: 2px; }
.door-units { font-size: 12px; color: #dc3545; font-weight: 600; margin-left: 36px; margin-bottom: 4px; }
.btn-missing { background: #6c757d; color: white; position: relative; }
.btn-missing.has-missing { background: #ffc107; color: #333; }
.door.skipped { border-left-color: #ffc107; opacity: 0.7; cursor: pointer; padding: 8px 12px; }
.door.skipped .door-actions, .door.skipped .door-notes, .door.skipped .door-meta, .door.skipped .door-voters, .door.skipped .door-units { display: none; }
.door.skipped .door-header { margin-bottom: 0; }
.step-num { background: #1B4332; color: white; width: 28px; height: 28px; border-radius: 50%;

.door.done .step-num { background: #28a745; }
.door-addr { font-weight: 600; font-size: 15px; }
.disp-badge { font-size: 11px; font-weight: 600; padding: 2px 6px; border-radius: 10px; display: none; }

.door-meta { font-size: 12px; color: #666; margin-left: 36px; margin-bottom: 8px; }
.door-actions { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-left: 36px; margin-bottom: 6px; }

<body>

<!-- ===== DASHBOARD ===== -->
<div id="dashboard">
  <h1>CD-8 Canvass</h1>
  <p class="subtitle">Enter your name or 3-character code to see your assigned turfs</p>
  <div class="name-entry" id="nameEntry">
    <label>Your Name</label>
    <div class="name-row">
      <input type="text" id="nameInput" class="name-input" placeholder="First name..." />
      <button class="btn-set-name" onclick="setVolunteerName()">Go</button>
    </div>
    <div class="code-entry" style="margin-top:12px; border:none; padding:0;">
      <label>Or enter your 3-character code</label>
      <input type="text" id="codeInput" class="code-input" placeholder="EV3" maxlength="3"
             onkeyup="if(event.key==='Enter')lookupByCode()" />
    </div>
  </div>
  <div class="name-entry" id="nameDisplay" style="display:none;">
    <div class="name-display">
      <span class="greeting" id="greetingText"></span>
      <span class="change-link" onclick="changeName()">Change</span>
    </div>
  </div>
  <div id="assignmentStatus"></div>
  <div id="sessionCards"></div>
</div>

<!-- ===== TURF VIEW ===== -->
<div id="turfview">
  <div class="sticky-header">
    <div class="header" style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap;">
      <div style="flex:1;">
        <h1 id="tvTitle"></h1>
        <p id="tvSubtitle"></p>
      </div>
      <button class="btn-start" id="btnStart" onclick="startSession()" style="margin-left:8px; border-radius:6px; padding:8px 14px; font-size:13px;">Start</button>
      <button class="btn-pause" id="btnPause" onclick="pauseSession()" style="margin-left:8px; border-radius:6px; padding:8px 14px; font-size:13px;">Pause</button>
      <div style="width:100%; margin-top:6px;">
        <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
      </div>
    </div>
    <div class="stats">
      <div><div class="num" id="statDoors">0</div>Knocked</div>
      <div><div class="num" id="statContacts">0</div>Contacts</div>
      <div><div class="num" id="statLeft">0</div>Left</div>
      <div><div class="num" id="statDPH">&mdash;</div>D/Hr</div>
    </div>
    <div class="action-bar">
      <a id="btnRoute" href="#" target="_blank" class="btn-route">Route Map</a>
      <button class="btn-route" style="background:#17a2b8" id="btnRouteList" onclick="showRouteOverview()">All Stops</button>
      <button class="btn-missing" id="btnMissing" onclick="scrollToMissing()">Missing</button>
      <button class="btn-dash" onclick="showDashboard()">Dashboard</button>
    </div>
    <div class="route-note" id="routeNote"></div>
    <div class="sticky-shadow"></div>
  </div>
  <div class="content">
    <div class="resume-banner" id="resumeBanner">Resumed &mdash; <span id="resumeCount"></span> doors already knocked</div>
    <div id="doorList"></div>
    <div id="nextTurf"></div>
  </div>
</div>

// ===== VOLUNTEER NAME =====
function setVolunteerName() {
  var name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  volunteerName = name;
  try { localStorage.setItem('canvass_volunteer', name); } catch(e) {}
  showNameDisplay();
  loadAssignments();
}

function lookupByCode() {
  var code = document.getElementById('codeInput').value.trim().toUpperCase();
  if (!code) return;
  volunteerCode = code;
  // Load assignments and find who has this code
  var cb = 'codeCB_' + Math.random().toString(36).slice(2);
  window[cb] = function(data) {
    if (data.status === 'ok' && data.assigned) {
      var found = null;
      for (var k in data.assigned) {
        var vname = data.assigned[k];
        if (vname && vname.substring(0,2).toUpperCase() === code.substring(0,2).toUpperCase()) {
          found = vname;
          break;
        }
      }
      if (found) {
        document.getElementById('nameInput').value = found;
        setVolunteerName();
      } else {
        document.getElementById('assignmentStatus').innerHTML =
          '<div class="no-assignment">No volunteer found with code "' + code + '". Try entering your name instead.</div>';
      }
    }
    delete window[cb];
  };
  var s = document.createElement('script');
  s.src = SCRIPT_URL + '?action=list&callback=' + cb;
  document.body.appendChild(s);
}

function changeName() {
  document.getElementById('nameEntry').style.display = 'block';
  document.getElementById('nameDisplay').style.display = 'none';
  document.getElementById('nameInput').value = volunteerName;
  document.getElementById('nameInput').focus();
  myTurfs = [];
}

function showNameDisplay() {
  document.getElementById('nameEntry').style.display = 'none';
  document.getElementById('nameDisplay').style.display = 'block';
  document.getElementById('greetingText').textContent = 'Welcome, ' + volunteerName;
}

function loadVolunteerName() {
  try {
    var saved = localStorage.getItem('canvass_volunteer');
    if (saved) {
      volunteerName = saved;
      document.getElementById('nameInput').value = saved;
      showNameDisplay();
      return true;
    }
  } catch(e) {}
  return false;
}

// ===== ASSIGNMENTS (from manager) =====
function turfClaimKey(tid) {
  var t = TURFS[String(tid)];
  return 's' + t.session + '_t' + tid;
}

function loadAssignments() {
  var cb = 'assignCB_' + Math.random().toString(36).slice(2);
  window[cb] = function(data) {
    if (data.status === 'ok' && data.assigned) {
      assignments = data.assigned;
      findMyTurfs();
      buildDashboard();
    }
    delete window[cb];
  };
  var s = document.createElement('script');
  s.src = SCRIPT_URL + '?action=list&callback=' + cb;
  document.body.appendChild(s);
}

function findMyTurfs() {
  myTurfs = [];
  if (!volunteerName) return;
  var nameLower = volunteerName.toLowerCase();
  for (var key in assignments) {
    if (assignments[key].toLowerCase() === nameLower) {
      // Parse turf ID from key like "s1_t63"
      var m = key.match(/t(\d+)$/);
      if (m) myTurfs.push(parseInt(m[1]));
    }
  }
}

function isTurfComplete(tid) {
  var t = TURFS[String(tid)];
  if (!t) return false;
  var key = 'canvass_s' + t.session + '_t' + t.tid;
  try {
    var raw = localStorage.getItem(key);
    if (!raw) return false;
    var saved = JSON.parse(raw);
    if (!saved.doorStatus) return false;
    var done = Object.keys(saved.doorStatus).length;
    return done >= t.n;
  } catch(e) { return false; }
}

// ===== DASHBOARD =====
function buildDashboard() {
  var html = '';
  var statusHtml = '';

  if (!volunteerName) {
    document.getElementById('sessionCards').innerHTML = '';
    document.getElementById('assignmentStatus').innerHTML = '';
    return;
  }

  if (myTurfs.length === 0) {
    statusHtml = '<div class="no-assignment">No turfs assigned to you yet. Check with your manager or try a different name.</div>';
    document.getElementById('assignmentStatus').innerHTML = statusHtml;
  } else {
    statusHtml = '<div class="total-banner"><div class="big">' + myTurfs.length + ' turf' + (myTurfs.length>1?'s':'') + ' assigned to you</div>';
    var totalDoors = 0;
    myTurfs.forEach(function(tid) { if (TURFS[String(tid)]) totalDoors += TURFS[String(tid)].n; });
    statusHtml += '<div>' + totalDoors + ' doors total</div></div>';
    document.getElementById('assignmentStatus').innerHTML = statusHtml;
  }

  // Show sessions, highlighting assigned turfs
  SESSIONS.forEach(function(s) {
    var hasAssigned = false;
    s.turfs.forEach(function(t) { if (myTurfs.indexOf(t.tid) >= 0) hasAssigned = true; });
    if (!hasAssigned) return; // Only show sessions that have turfs assigned to this volunteer

    var sessEstLow = Math.round(s.total_doors / 30 * 60);
    var sessEstHigh = Math.round(s.total_doors / 20 * 60);
    html += '<div class="session-card"><div class="session-hdr">Session ' + s.session + '</div>';
    html += '<div class="session-stats">' + s.total_doors + ' doors &middot; ' + s.total_voters + ' voters &middot; ~' + sessEstLow + '–' + sessEstHigh + ' min</div>';
    s.turfs.forEach(function(t, i) {
      var isAssigned = myTurfs.indexOf(t.tid) >= 0;
      var complete = isAssigned && isTurfComplete(t.tid);
      var label = t.city + ' ' + t.zip + ' — Turf ' + t.tid;
      var cssClass = 'turf-link' + (isAssigned ? (complete ? ' assigned completed' : ' assigned') : ' not-assigned');
      html += '<div class="' + cssClass + '"' + (isAssigned ? ' onclick="loadTurf(' + t.tid + ')"' : '') + '>';
      var estMinLow = Math.round(t.doors / 30 * 60);
      var estMinHigh = Math.round(t.doors / 20 * 60);
      html += '<span class="turf-label">' + label + '</span>';
      html += '<span class="turf-detail">' + t.doors + ' doors &middot; ~' + estMinLow + '–' + estMinHigh + ' min knocking</span>';
      if (complete) html += '<span class="turf-assigned">&#10003; Complete</span>';
      else if (isAssigned) html += '<span class="turf-assigned">Tap to start &rarr;</span>';
      html += '</div>';
    });
    html += '</div>';
  });

  if (!html && myTurfs.length === 0) {
    html = '';
  }
  document.getElementById('sessionCards').innerHTML = html;
}

function showDashboard() {
  if (timerInterval) clearInterval(timerInterval);
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('turfview').style.display = 'none';
  window.scrollTo(0, 0);
  // Update URL
  history.pushState(null, '', window.location.pathname);
}

// ===== TURF VIEW =====
function loadTurf(tid) {
  tid = String(tid);
  currentTurf = TURFS[tid];
  if (!currentTurf) { alert('Turf not found: ' + tid); return; }
  
  var t = currentTurf;
  doorStatus = {};
  doorNotes = {};
  sessionStartTime = null;
  if (timerInterval) clearInterval(timerInterval);
  
  document.getElementById('tvTitle').textContent = 'Session ' + t.session + ' — ' + t.city + ' ' + t.zip;
  document.getElementById('tvSubtitle').textContent = t.n + ' doors · Turf ' + t.tid + ' · ';
  document.getElementById('timerSpan') && (document.getElementById('timerSpan').textContent = '');
  document.getElementById('btnRoute').href = t.route_url;
  var routeMsg = t.n > 25 ? 'First ~25 stops shown on Google Maps (route has ' + t.n + ' total)' : t.route_note + ' on Google Maps';
  document.getElementById('routeNote').textContent = routeMsg;
  document.getElementById('btnStart').style.display = 'block';
  document.getElementById('btnPause').style.display = 'none';
  document.getElementById('resumeBanner').style.display = 'none';
  
  // Build door list
  var html = '';
  t.addrs.forEach(function(a) {
    var navUrl = 'https://www.google.com/maps/dir/?api=1&destination=' + a.lat + ',' + a.lon + '&travelmode=walking';
    var wc, wb;
    if (a.s === 1) {
      wb = '<span class="walk-badge" style="background:#007bff">START</span>';
    } else {
      wc = a.w < 1.5 ? '#28a745' : (a.w < 3 ? '#ffc107' : '#dc3545');
      wb = '<span class="walk-badge" style="background:' + wc + '">' + a.w + 'm</span>';
    }
    html += '<div class="door" id="door-' + a.s + '" data-step="' + a.s + '" data-addr="' + a.a + ', ' + a.c + ', CO ' + a.z + '" data-lat="' + a.lat + '" data-lon="' + a.lon + '" onclick="doorTap(event,' + a.s + ')">';
    html += '<div class="door-header"><span class="step-num">' + a.s + '</span>';
    html += '<span class="door-addr">' + a.a + '</span>';
    html += '<span class="disp-badge" id="badge-' + a.s + '"></span>' + wb;
    html += '<a href="' + navUrl + '" target="_blank" class="btn-nav-sm">Navigate</a></div>';
    // Voter names
    var namesHtml = '';
    if (a.names && a.names.length > 0) {
      namesHtml = '<div class="door-voters">' + a.names.join(', ') + '</div>';
    }
    // Unit info
    var unitHtml = '';
    if (a.units && a.units.length > 0) {
      unitHtml = '<div class="door-units">Units: ' + a.units.join(', ') + '</div>';
    }
    html += '<div class="door-meta">' + a.c + ' ' + a.z + ' &middot; ' + a.v + ' voter(s)' + '</div>';
    html += namesHtml + unitHtml;
    html += '<div class="door-notes"><div class="notes-row">';
    html += '<input type="text" id="notes-' + a.s + '" placeholder="Notes..." class="notes-input" />';
    html += '<button class="btn-save-note" onclick="saveNote(' + a.s + ')">Save Note</button>';
    html += '</div><div class="note-saved" id="note-saved-' + a.s + '"></div></div>';
    html += '<div class="door-actions">';
    html += '<button class="btn btn-litdrop" onclick="markDoor(' + a.s + ',\'Lit Drop\')">Lit Drop</button>';
    html += '<button class="btn btn-contacted" onclick="markDoor(' + a.s + ',\'Contacted\')">Contacted</button>';
    html += '<button class="btn btn-volunteer" onclick="markDoor(' + a.s + ',\'Volunteer\')">Volunteer</button>';
    html += '<button class="btn btn-refused" onclick="markDoor(' + a.s + ',\'Refused\')">Refused</button>';
    html += '</div>';
    html += '<div class="door-actions">';
    html += '<button class="btn btn-moved" onclick="markDoor(' + a.s + ',\'Moved\')">Moved</button>';
    html += '<button class="btn btn-skip" onclick="markDoor(' + a.s + ',\'Skipped\')">Skip</button>';
    html += '</div>';
    html += '<div class="door-status" id="status-' + a.s + '"></div></div>';
  });
  document.getElementById('doorList').innerHTML = html;
  
  // Build next-turf link
  var sess = SESSIONS.find(function(s) { return s.session === t.session; });
  var turfIdx = -1;
  if (sess) {
    for (var i = 0; i < sess.turfs.length; i++) {
      if (sess.turfs[i].tid === t.tid) { turfIdx = i; break; }
    }
  }
  var ntHtml = '';
  if (sess && turfIdx >= 0 && turfIdx < sess.turfs.length - 1) {
    var nt = sess.turfs[turfIdx + 1];
    ntHtml = '<div class="next-turf"><h3>Next Cluster</h3>';
    ntHtml += '<p>' + nt.city + ' ' + nt.zip + ' &middot; ' + nt.doors + ' doors</p>';
    ntHtml += '<button class="btn-next" onclick="loadTurf(' + nt.tid + ')">Go to Next Cluster &rarr;</button>';
    ntHtml += '<a href="https://www.google.com/maps/dir/?api=1&destination=' + nt.center_lat + ',' + nt.center_lon + '&travelmode=driving" target="_blank" class="btn-drive">Drive to Next Cluster</a></div>';
  } else {
    ntHtml = '<div class="next-turf"><h3>Session Complete!</h3><p>Great work! Head home.</p>';
    ntHtml += '<a href="https://www.google.com/maps/dir/?api=1&destination=39.9463,-104.9540&travelmode=driving" target="_blank" class="btn-drive">Drive Home</a>';
    ntHtml += '<button class="btn-next" style="background:#6c757d" onclick="showDashboard()">Back to Dashboard</button></div>';
  }
  // Add End Route button before next-turf
  ntHtml = '<button class="btn-end-route" onclick="endRoute()">End Route Early</button>' + ntHtml;
  document.getElementById('nextTurf').innerHTML = ntHtml;
  
  // Show turf view
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('turfview').style.display = 'block';
  
  // Restore state
  restoreState();
  if (Object.keys(doorStatus).length === 0) {
    var d1 = document.getElementById('door-1');
    if (d1) d1.classList.add('active');
  }
  
  updateStats();
  updateMissingBtn();
  window.scrollTo(0, 0);
  
  // Update URL for bookmarking
  history.pushState(null, '', window.location.pathname + '?turf=' + tid);
}

// ===== STATE MANAGEMENT =====
function storageKey() { return 'canvass_s' + currentTurf.session + '_t' + currentTurf.tid; }

function saveLocal() {
  var state = { doorStatus: doorStatus, doorNotes: doorNotes, sessionStartTime: sessionStartTime, lastSaved: new Date().toISOString() };
  try { localStorage.setItem(storageKey(), JSON.stringify(state)); } catch(e) {}
}

function restoreState() {
  try {
    var raw = localStorage.getItem(storageKey());
    if (!raw) return;
    var saved = JSON.parse(raw);
    if (!saved.doorStatus || Object.keys(saved.doorStatus).length === 0) return;
    doorStatus = saved.doorStatus;
    doorNotes = saved.doorNotes || {};
    if (saved.sessionStartTime) {
      sessionStartTime = saved.sessionStartTime;
      document.getElementById('btnStart').style.display = 'none';
      document.getElementById('btnPause').style.display = 'block';
      startTimer();
    }
    for (var step in doorStatus) {
      var door = document.getElementById('door-' + step);
      var statusEl = document.getElementById('status-' + step);
      var badge = document.getElementById('badge-' + step);
      if (door) {
        var disp = doorStatus[step];
        if (disp === 'Skipped') { door.classList.add('skipped'); } else { door.classList.add('done'); }
        if (statusEl) statusEl.innerHTML = '<span style="color:' + (DISP_COLORS[disp]||'#333') + '">' + disp + '</span>';
        if (badge) {
          var bc = DISP_COLORS[disp] || '#333';
          badge.style.background = bc;
          badge.style.color = (disp === 'Skipped') ? '#333' : '#fff';
          badge.textContent = disp;
        }
      }
      if (doorNotes[step]) {
        var ni = document.getElementById('notes-' + step);
        var ns = document.getElementById('note-saved-' + step);
        if (ni) ni.value = doorNotes[step];
        if (ns) ns.textContent = 'Note saved';
      }
    }
    highlightNext();
    document.getElementById('resumeBanner').style.display = 'block';
    document.getElementById('resumeCount').textContent = Object.keys(doorStatus).length;
    var next = findNextStep();
    if (next) {
      var el = document.getElementById('door-' + next);
      if (el) setTimeout(function() { el.scrollIntoView({behavior:'smooth', block:'center'}); }, 500);
    }
  } catch(e) {}
}

// ===== TIMER =====
function startSession() {
  sessionStartTime = new Date().toISOString();
  document.getElementById('btnStart').style.display = 'none';
  document.getElementById('btnPause').style.display = 'block';
  startTimer(); saveLocal();
  sendData({ action: 'timing', turf: storageKey(), event: 'start', volunteer: volunteerName });
}

function pauseSession() {
  var knocked = Object.keys(doorStatus).length;
  var contacts = Object.values(doorStatus).filter(function(v){return v==='Contacted'||v==='Volunteer';}).length;
  var mins = getElapsedMinutes();
  var dph = mins > 0 ? Math.round(knocked / (mins/60) * 10) / 10 : 0;
  sendData({ action:'timing', turf:storageKey(), event:'pause', knocked:knocked, contacts:contacts, minutes:Math.round(mins), dph:dph, volunteer:volunteerName });
  if (timerInterval) clearInterval(timerInterval);
  document.getElementById('btnPause').textContent = 'Resume';
  document.getElementById('btnPause').style.background = '#28a745';
  document.getElementById('btnPause').style.color = '#fff';
  document.getElementById('btnPause').onclick = resumeSession;
  saveLocal();
}

function resumeSession() {
  document.getElementById('btnPause').textContent = 'Pause';
  document.getElementById('btnPause').style.background = '#ffc107';
  document.getElementById('btnPause').style.color = '#333';
  document.getElementById('btnPause').onclick = pauseSession;
  startTimer();
  sendData({ action:'timing', turf:storageKey(), event:'resume', volunteer:volunteerName });
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 1000);
  updateTimer();
}

function getElapsedMinutes() {
  if (!sessionStartTime) return 0;
  return (new Date() - new Date(sessionStartTime)) / 60000;
}

function updateTimer() {
  var mins = getElapsedMinutes();
  var h = Math.floor(mins / 60), m = Math.floor(mins % 60), s = Math.floor((mins * 60) % 60);
  var el = document.getElementById('tvSubtitle');
  var base = currentTurf.n + ' doors · Turf ' + currentTurf.tid + ' · ';
  el.textContent = base + (h > 0 ? h + 'h ' : '') + m + 'm ' + s + 's';
}

// ===== DOOR ACTIONS =====
function findNextStep() {
  for (var i = 1; i <= currentTurf.n; i++) { if (!doorStatus[i]) return i; }
  return null;
}

function highlightNext() {
  document.querySelectorAll('.door.active').forEach(function(el) { el.classList.remove('active'); });
  var next = findNextStep();
  if (next) { var el = document.getElementById('door-' + next); if (el) el.classList.add('active'); }
}

function updateStats() {
  var knocked = Object.keys(doorStatus).length;
  var contacts = Object.values(doorStatus).filter(function(v){return v==='Contacted'||v==='Volunteer';}).length;
  document.getElementById('statDoors').textContent = knocked;
  document.getElementById('statContacts').textContent = contacts;
  document.getElementById('statLeft').textContent = currentTurf.n - knocked;
  document.getElementById('progressBar').style.width = (knocked / currentTurf.n * 100) + '%';
  var mins = getElapsedMinutes();
  if (mins > 1 && knocked > 0) document.getElementById('statDPH').textContent = Math.round(knocked / (mins/60) * 10) / 10;
}

function saveNote(step) {
  var noteVal = document.getElementById('notes-' + step).value;
  if (!noteVal) return;
  doorNotes[step] = noteVal;
  saveLocal();
  var door = document.getElementById('door-' + step);
  document.getElementById('note-saved-' + step).textContent = 'Note saved ✓';
  sendData({ action:'submit', turf_id:storageKey(), stop_num:step, address:door.getAttribute('data-addr'), disposition:'Note', notes:noteVal, volunteer:volunteerName });
}

function markDoor(step, disposition) {
  event.stopPropagation(); // Prevent doorTap from firing
  var door = document.getElementById('door-' + step);
  var statusEl = document.getElementById('status-' + step);
  var badge = document.getElementById('badge-' + step);
  var addr = door.getAttribute('data-addr');
  var notes = document.getElementById('notes-' + step).value || '';
  doorStatus[step] = disposition;
  if (notes) doorNotes[step] = notes;
  // Auto-start timer on first disposition if not already running
  if (!sessionStartTime) {
    sessionStartTime = new Date().toISOString();
    document.getElementById('btnStart').style.display = 'none';
    document.getElementById('btnPause').style.display = 'block';
    startTimer();
    sendData({ action: 'timing', turf: storageKey(), event: 'auto_start', volunteer: volunteerName });
  }
  if (disposition === 'Skipped') {
    door.classList.add('skipped');
  } else {
    door.classList.add('done');
  }
  statusEl.innerHTML = '<span style="color:' + (DISP_COLORS[disposition]||'#333') + '">' + disposition + '</span>';
  // Set collapsed badge
  var color = DISP_COLORS[disposition] || '#333';
  badge.style.background = color;
  badge.style.color = (disposition === 'Skipped') ? '#333' : '#fff';
  badge.textContent = disposition;
  updateStats(); updateMissingBtn(); saveLocal();
  sendData({ action:'submit', turf_id:storageKey(), stop_num:step, address:addr, disposition:disposition, notes:notes, lat:door.getAttribute('data-lat'), lng:door.getAttribute('data-lon'), volunteer:volunteerName });
}

function doorTap(event, step) {
  // Only respond to taps on the door div itself (not buttons/links inside)
  if (event.target.tagName === 'BUTTON' || event.target.tagName === 'A' || event.target.tagName === 'INPUT') return;
  var door = document.getElementById('door-' + step);
  if (!door.classList.contains('done') && !door.classList.contains('skipped')) return;
  undoDoor(step);
}

function undoDoor(step) {
  var door = document.getElementById('door-' + step);
  var statusEl = document.getElementById('status-' + step);
  var badge = document.getElementById('badge-' + step);
  var addr = door.getAttribute('data-addr');
  door.classList.remove('done', 'skipped');
  statusEl.innerHTML = '';
  badge.textContent = '';
  badge.style.background = '';
  delete doorStatus[step];
  highlightNext(); updateStats(); updateMissingBtn(); saveLocal();
  sendData({ action:'submit', turf_id:storageKey(), stop_num:step, address:addr, disposition:'Undo', notes:'', lat:door.getAttribute('data-lat'), lng:door.getAttribute('data-lon'), volunteer:volunteerName });
}

function getMissingSteps() {
  // Find undispositioned doors that have been "passed" (a later door has been dispositioned)
  var missing = [];
  var maxDone = 0;
  for (var s in doorStatus) { if (parseInt(s) > maxDone) maxDone = parseInt(s); }
  for (var i = 1; i < maxDone; i++) {
    if (!doorStatus[i]) missing.push(i);
  }
  return missing;
}

function updateMissingBtn() {
  var btn = document.getElementById('btnMissing');
  if (!btn) return;
  var missing = getMissingSteps();
  if (missing.length > 0) {
    btn.classList.add('has-missing');
    btn.textContent = 'Missing (' + missing.length + ')';
  } else {
    btn.classList.remove('has-missing');
    btn.textContent = 'Missing';
  }
}

function scrollToMissing() {
  var missing = getMissingSteps();
  if (missing.length === 0) { alert('No missing doors!'); return; }
  var el = document.getElementById('door-' + missing[0]);
  if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
}

function endRoute() {
  var knocked = Object.keys(doorStatus).length;
  var contacts = Object.values(doorStatus).filter(function(v){return v==='Contacted'||v==='Volunteer';}).length;
  var mins = getElapsedMinutes();
  var dph = mins > 0 ? Math.round(knocked / (mins/60) * 10) / 10 : 0;
  sendData({ action:'timing', turf:storageKey(), event:'end', knocked:knocked, contacts:contacts, minutes:Math.round(mins), dph:dph, volunteer:volunteerName });
  if (timerInterval) clearInterval(timerInterval);
  saveLocal();
  alert('Route ended. ' + knocked + ' doors knocked in ' + Math.round(mins) + ' minutes.');
  showDashboard();
}

function sendData(payload) {
  var ifr = document.createElement("iframe");
  ifr.name = "sf_" + Math.random().toString(36).slice(2);
  ifr.style.display = "none";
  document.body.appendChild(ifr);
  var form = document.createElement("form");
  form.method = "GET"; form.action = SCRIPT_URL; form.target = ifr.name;
  for (var k in payload) {
    var inp = document.createElement("input");
    inp.type = "hidden"; inp.name = k; inp.value = payload[k];
    form.appendChild(inp);
  }
  document.body.appendChild(form); form.submit();
  setTimeout(function(){ try{ifr.remove();form.remove();}catch(e){} }, 15000);
}

// ===== INIT =====
var params = new URLSearchParams(window.location.search);
var urlVolunteer = params.get('volunteer');
var urlTurf = params.get('turf');

// If link includes volunteer name, use it
if (urlVolunteer) {
  volunteerName = urlVolunteer;
  try { localStorage.setItem('canvass_volunteer', urlVolunteer); } catch(e) {}
  document.getElementById('nameInput').value = urlVolunteer;
  showNameDisplay();
}

// Load saved name or use URL param
if (!volunteerName) loadVolunteerName();

// Load assignments from sheet, then show dashboard or direct turf
if (volunteerName) {
  var initCb = 'initCB_' + Math.random().toString(36).slice(2);
  window[initCb] = function(data) {
    if (data.status === 'ok' && data.assigned) {
      assignments = data.assigned;
      findMyTurfs();
      buildDashboard();
      // If URL has a specific turf, load it directly
      if (urlTurf && TURFS[urlTurf]) {
        loadTurf(urlTurf);
      }
    }
    delete window[initCb];
  };
  var initScript = document.createElement('script');
  initScript.src = SCRIPT_URL + '?action=list&callback=' + initCb;
  document.body.appendChild(initScript);
} else {
  buildDashboard();
}

// Handle back button
window.addEventListener('popstate', function() {
  var p = new URLSearchParams(window.location.search);
  var t = p.get('turf');
  if (t && TURFS[t]) loadTurf(t);
  else showDashboard();
});

// ===== ROUTE OVERVIEW =====
function showRouteOverview() {
  if (!currentTurf) return;
  var t = currentTurf;
  var html = '<button class="close-btn" onclick="closeRouteOverview()">Close</button>';
  html += '<h3>All ' + t.n + ' Stops — Turf ' + t.tid + '</h3>';
  t.addrs.forEach(function(a) {
    var doneClass = doorStatus[a.s] ? ' rs-done' : '';
    var walkText = a.s === 1 ? 'START' : a.w + 'm walk';
    html += '<div class="route-stop' + doneClass + '">';
    html += '<span class="rs-num">' + a.s + '</span>';
    html += '<span class="rs-addr">' + a.a + '</span>';
    html += '<span class="rs-walk">' + walkText + '</span>';
    html += '</div>';
  });
  document.getElementById('routeOverlay').innerHTML = '<div class="route-list">' + html + '</div>';
  document.getElementById('routeOverlay').classList.add('show');
}

function closeRouteOverview() {
  document.getElementById('routeOverlay').classList.remove('show');
}
